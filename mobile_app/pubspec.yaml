name: neuroguard_app
description: NeuroGuard companion — BLE GPS to ESP32, seizure alerts, Firebase.
publish_to: "none"
version: 2.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_blue_plus: ^1.35.5
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  firebase_core: ^3.8.1
  firebase_database: ^11.2.0
  firebase_messaging: ^15.1.6
  google_maps_flutter: ^2.10.0
  url_launcher: ^6.3.1
  fl_chart: ^0.69.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

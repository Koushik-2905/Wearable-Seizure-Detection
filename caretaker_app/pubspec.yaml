name: neuroguard_caretaker
description: NeuroGuard caretaker app — instant seizure alerts, alarm, live vitals.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.8.1
  firebase_database: ^11.2.0
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^18.0.1
  flutter_ringtone_player: ^4.0.0+3
  vibration: ^2.0.1
  wakelock_plus: ^1.2.8
  url_launcher: ^6.3.1
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
